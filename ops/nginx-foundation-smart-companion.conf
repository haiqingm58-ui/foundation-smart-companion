# Place these locations inside the active server block.
# Static files are served from /var/www/html/foundation-smart-companion,
# which should be a symlink to /var/www/releases/foundation-smart-companion/current.

location ^~ /foundation-smart-companion/assets/ {
    root /var/www/html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

location ^~ /foundation-smart-companion/knowledge/ {
    root /var/www/html;
    try_files $uri =404;
    expires 10m;
    add_header Cache-Control "public, max-age=600";
}

location ^~ /foundation-smart-companion/ {
    root /var/www/html;
    try_files $uri $uri/ /foundation-smart-companion/index.html;
    add_header Cache-Control "no-cache";
}
